steps:
  # ─────────────────────────────────────────────────────────────────────────
  # Step 1: Build multi-stage Docker image
  # Stage 1 compiles React, Stage 2 assembles the Python runtime
  # ─────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args:
      - 'build'
      - '--tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '--tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '--cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '.'

  # ─────────────────────────────────────────────────────────────────────────
  # Step 2: Push both tags to Artifact Registry
  # ─────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}'
    waitFor: ['docker-build']

  # ─────────────────────────────────────────────────────────────────────────
  # Step 3: Deploy to Cloud Run
  # Secrets come from Secret Manager — never hardcoded
  # ─────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'cloud-run-deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--concurrency=10'
      # ── Secrets from Secret Manager ──────────────────────────────────────
      - '--set-secrets=GITLAB_TOKEN=GITLAB_TOKEN:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,WEBHOOK_SECRET=WEBHOOK_SECRET:latest'
      # ── Non-secret env vars ───────────────────────────────────────────────
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GITLAB_MCP_URL=${_GITLAB_MCP_URL},GEMINI_MODEL=${_GEMINI_MODEL}'
      - '--project=${PROJECT_ID}'
    waitFor: ['docker-push']

# ── Substitution defaults (override with --substitutions on trigger) ───────────
substitutions:
  _REGION: asia-south1
  _REPO: pipeline-guardian
  _SERVICE: pipeline-guardian
  _GITLAB_MCP_URL: https://gitlab.com/api/v4/mcp
  _GEMINI_MODEL: gemini-2.5-flash

# ── Build options ──────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  env:
    - 'DOCKER_BUILDKIT=1'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'

timeout: '1200s'    # 20 min — npm install + pip install in multi-stage build can be slow
